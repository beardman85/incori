# Cloudflare Pages configuration for Inclusion Oriented (incori.org)
# The site builds to ./dist (static). Pages Functions live in ./functions.
name = "incori-web"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Secrets used by functions/api/contact.ts (set in the Cloudflare dashboard,
# NOT committed here). Added during the forms phase:
#   RESEND_API_KEY   — Resend API key
#   CONTACT_TO       — hello@incori.org
#   CONTACT_FROM     — verified sender, e.g. website@incori.org
